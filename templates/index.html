<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ML Learning Agent</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    #chat-panel {
      width: 35%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ddd;
      background: white;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.5;
    }

    .user {
      background: #0084ff;
      color: white;
      align-self: flex-end;
    }

    .agent {
      background: #f0f0f0;
      color: #333;
      align-self: flex-start;
    }

    #input-area {
      display: flex;
      padding: 16px;
      border-top: 1px solid #ddd;
      gap: 8px;
    }

    #input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }

    #input-area button {
      padding: 10px 18px;
      background: #0084ff;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    #animation-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #animation-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #333;
    }

    #plot {
      width: 100%;
      height: 80%;
    }

    #placeholder {
      color: #aaa;
      font-size: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="chat-panel">
    <div id="messages">
      <div class="message agent">
        Hi! Ask me about gradient descent, linear regression, kmeans or decision tree.
      </div>
    </div>
    <div id="input-area">
      <input type="text" id="user-input" placeholder="Ask about an ML topic..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div id="animation-panel">
    <div id="animation-title"></div>
    <div id="plot"></div>
    <div id="plot2" style="width:100%; height:80%; margin-top: 10px;"></div>
    <div id="placeholder">Ask a question to see the animation</div>
  </div>

  <script src="/static/animations/gradient_descent.js"></script>
  <script src="/static/animations/linear_regression.js"></script>
  <script src="/static/animations/kmeans.js"></script>
  <script src="/static/animations/decision_tree.js"></script>

  <script>
    const input = document.getElementById("user-input");

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
      const query = input.value.trim();
      if (!query) return;

      addMessage(query, "user");
      input.value = "";

      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query })
      });

      const data = await res.json();
      addMessage(data.explanation, "agent");

      if (data.topic) {
        playAnimation(data.topic);
      }
    }

    function addMessage(text, sender) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `message ${sender}`;
      div.innerText = text.trim();
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function playAnimation(topic) {
      document.getElementById("placeholder").style.display = "none";
      document.getElementById("animation-title").innerText = topic.toUpperCase();

      if (topic === "gradient descent") animateGradientDescent();
      else if (topic === "linear regression") animateLinearRegression();
      else if (topic === "kmeans") animateKmeans();
      else if (topic === "decision tree") animateDecisionTree();
    }
  </script>

</body>
</html>
